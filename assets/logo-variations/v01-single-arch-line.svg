<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Ebrostay">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13b878"/>
      <stop offset="1" stop-color="#0a7a54"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#g1)"/>
  <g fill="none" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- lion columns at both ends (Puente de Piedra) -->
    <path d="M11 40 V30"/>
    <path d="M53 40 V30"/>
    <!-- deck resting on the arch crowns -->
    <path d="M10 40 H54"/>
    <!-- four stone arches springing from the Ebro -->
    <path d="M10 46 A5.5 5.5 0 0 1 21 46"/>
    <path d="M21 46 A5.5 5.5 0 0 1 32 46"/>
    <path d="M32 46 A5.5 5.5 0 0 1 43 46"/>
    <path d="M43 46 A5.5 5.5 0 0 1 54 46"/>
  </g>
  <!-- lion blocks atop the columns -->
  <rect x="9.4" y="26.4" width="3.2" height="3.2" rx="0.6" fill="#c8f169"/>
  <rect x="51.4" y="26.4" width="3.2" height="3.2" rx="0.6" fill="#c8f169"/>
  <!-- Ebro river / waterline -->
  <line x1="10" y1="46" x2="54" y2="46" stroke="#c8f169" stroke-width="2.6" stroke-linecap="round"/>
</svg>
