<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Ebrostay">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13b878"/>
      <stop offset="1" stop-color="#0a7a54"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#g2)"/>
  <!-- Basilica del Pilar behind the bridge (the Zaragoza postcard view) -->
  <g fill="#ffffff">
    <!-- four corner towers with dome caps -->
    <rect x="13.6" y="22" width="2.6" height="11" rx="0.6"/>
    <rect x="47.8" y="22" width="2.6" height="11" rx="0.6"/>
    <circle cx="14.9" cy="21.4" r="1.6"/>
    <circle cx="49.1" cy="21.4" r="1.6"/>
    <rect x="21.4" y="26" width="2.2" height="7" rx="0.5"/>
    <rect x="40.4" y="26" width="2.2" height="7" rx="0.5"/>
    <circle cx="22.5" cy="25.4" r="1.4"/>
    <circle cx="41.5" cy="25.4" r="1.4"/>
    <!-- central dome + lantern -->
    <path d="M26 33 A7 7 0 0 1 40 33 Z"/>
    <rect x="30.6" y="15.5" width="2.8" height="6" rx="0.6"/>
    <circle cx="32" cy="14.6" r="1.9"/>
  </g>
  <!-- Puente de Piedra in front -->
  <g fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 42 H53"/>
    <path d="M11 48 A5 5 0 0 1 21 48"/>
    <path d="M21 48 A5 5 0 0 1 31 48"/>
    <path d="M31 48 A5 5 0 0 1 41 48"/>
    <path d="M41 48 A5 5 0 0 1 51 48"/>
  </g>
  <!-- Ebro river -->
  <line x1="11" y1="48" x2="53" y2="48" stroke="#c8f169" stroke-width="2.4" stroke-linecap="round"/>
</svg>
