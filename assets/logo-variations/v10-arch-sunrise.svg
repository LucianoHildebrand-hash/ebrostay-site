<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Ebrostay">
  <defs>
    <linearGradient id="g10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13b878"/>
      <stop offset="1" stop-color="#0a7a54"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#g10)"/>
  <!-- sun rising over the Ebro -->
  <circle cx="32" cy="20" r="5" fill="#c8f169"/>
  <g fill="none" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- lion columns -->
    <path d="M11 42 V33"/>
    <path d="M53 42 V33"/>
    <!-- deck -->
    <path d="M10 42 H54"/>
    <!-- four stone arches -->
    <path d="M10 48 A5.5 5.5 0 0 1 21 48"/>
    <path d="M21 48 A5.5 5.5 0 0 1 32 48"/>
    <path d="M32 48 A5.5 5.5 0 0 1 43 48"/>
    <path d="M43 48 A5.5 5.5 0 0 1 54 48"/>
  </g>
  <!-- Ebro river -->
  <line x1="10" y1="48" x2="54" y2="48" stroke="#c8f169" stroke-width="2.6" stroke-linecap="round"/>
</svg>
